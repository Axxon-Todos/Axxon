services:
  # Next.js runs separately from the websocket process so each service can restart independently.
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-dev
    command: ["pnpm", "dev-next"]
    # Load runtime secrets and OAuth config without baking them into the dev image.
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      PORT: 3000
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ws:
    build:
      context: .
      dockerfile: Dockerfile
      target: ws-dev
    command: ["pnpm", "dev-ws"]
    # The websocket service needs the same auth and DB envs as the app to validate sessions.
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      WS_PORT: 4000
      REDIS_URL: redis://redis:6379
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - ws_node_modules:/app/node_modules
    depends_on:
      redis:
        condition: service_healthy

volumes:
  app_node_modules:
  app_next:
  ws_node_modules:
  redis_data:
