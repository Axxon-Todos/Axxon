services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-prod
      # These build args populate the browser bundle because NEXT_PUBLIC_* is compiled into Next.js output.
      args:
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_REDIRECT_URI: ${NEXT_PUBLIC_REDIRECT_URI:-}
        NEXT_PUBLIC_HOSTNAME: ${NEXT_PUBLIC_HOSTNAME:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    restart: unless-stopped
    # Runtime envs are still required for the server-side OAuth exchange and DB access.
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ws:
    build:
      context: .
      dockerfile: Dockerfile
      target: ws-prod
    restart: unless-stopped
    # Runtime envs are loaded here because the websocket server verifies JWTs and hits the database.
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      WS_PORT: 4000
      REDIS_URL: redis://redis:6379
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const net=require('net');const socket=net.connect(4000,'127.0.0.1');socket.on('connect',()=>{socket.end();process.exit(0);});socket.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),5000);\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Persist Redis state between restarts for local production-style testing.
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
